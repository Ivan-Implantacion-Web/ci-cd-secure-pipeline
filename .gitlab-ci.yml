stages:
  - test
  - security
  - deploy

image: node:18

cache:
  paths:
    - node_modules/

before_script:
  - npm install

test_job:
  stage: test
  script:
    - npm test

security_job:
  stage: security
  script:
    - npm run security

deploy_job:
  stage: deploy
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -t hello-ci .
    - docker run -d -p 3000:3000 hello-ci
